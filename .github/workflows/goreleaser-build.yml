---
##############################################
# Pipeline to build and release Go apps     #
# with GoReleaser.                          #
#                                           #
# Supports full releases, snapshots, and   #
# custom configurations via .goreleaser.yml #
##############################################

name: GoReleaser Build

on:
  workflow_call:
    inputs:
      goreleaser-config:
        description: "Path to .goreleaser.yml config file in calling repo (default: .goreleaser.yml)"
        required: false
        type: string
        default: .goreleaser.yml
      snapshot:
        description: "Build snapshot (no release/publish). Use for non-release branches."
        required: false
        type: boolean
        default: false
      clean:
        description: "Remove dist directory before building"
        required: false
        type: boolean
        default: true
      skip-validate:
        description: "Skip validation checks"
        required: false
        type: boolean
        default: false
      skip-publish:
        description: "Skip publishing artifacts (build only)"
        required: false
        type: boolean
        default: false
      goreleaser-version:
        description: "GoReleaser version to use (default: latest)"
        required: false
        type: string
        default: latest
      go-version:
        description: "Go toolchain version to install (default: 1.25.6)"
        required: false
        type: string
        default: "1.25.6"
      working-directory:
        description: "Working directory for the build (default: .)"
        required: false
        type: string
        default: .
      docker-build:
        description: "Enable Docker image building (if configured in .goreleaser.yml)"
        required: false
        type: boolean
        default: false
      extra-args:
        description: "Additional GoReleaser CLI arguments (space-separated)"
        required: false
        type: string
        default: ""
      dry-run:
        description: "Perform dry-run (validate config without building)"
        required: false
        type: boolean
        default: false
      release-notes:
        description: "Path to custom release notes file"
        required: false
        type: string
        default: ""
    secrets:
      github-token:
        description: "GitHub token for creating releases (defaults to GITHUB_TOKEN)"
        required: false

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}
    
    permissions:
      contents: write
      packages: write
      id-token: write
    
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Fetch all tags
        run: git fetch --force --tags

      - name: Checkout PipelineTemplates repo
        uses: actions/checkout@v4
        with:
          repository: redjax/PipelineTemplates
          ref: github/goreleaser-build/v0.0.1
          path: ${{ inputs.working-directory }}/pipelinetemplates

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache: true

      - name: Docker Login (if Docker build enabled)
        if: ${{ inputs.docker-build }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.github-token || secrets.GITHUB_TOKEN }}

      - name: Setup QEMU (for cross-platform Docker builds)
        if: ${{ inputs.docker-build }}
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx (for cross-platform Docker builds)
        if: ${{ inputs.docker-build }}
        uses: docker/setup-buildx-action@v3

      - name: Validate GoReleaser config
        if: ${{ !inputs.dry-run }}
        env:
          GORELEASER_CONFIG: ${{ inputs.goreleaser-config }}
        run: |
          if [[ ! -f "$GORELEASER_CONFIG" ]]; then
            echo "[ERROR] GoReleaser config not found: $GORELEASER_CONFIG"
            exit 1
          fi
          echo "[INFO] Found GoReleaser config: $GORELEASER_CONFIG"

      - name: Run GoReleaser
        env:
          GITHUB_TOKEN: ${{ secrets.github-token || secrets.GITHUB_TOKEN }}
          GORELEASER_CONFIG: ${{ inputs.goreleaser-config }}
          SNAPSHOT: ${{ inputs.snapshot }}
          CLEAN: ${{ inputs.clean }}
          SKIP_VALIDATE: ${{ inputs.skip-validate }}
          SKIP_PUBLISH: ${{ inputs.skip-publish }}
          GORELEASER_VERSION: ${{ inputs.goreleaser-version }}
          DOCKER_BUILD: ${{ inputs.docker-build }}
          EXTRA_ARGS: ${{ inputs.extra-args }}
          DRY_RUN: ${{ inputs.dry-run }}
          RELEASE_NOTES: ${{ inputs.release-notes }}
        run: bash pipelinetemplates/shared/scripts/bash/go/goreleaser-build.sh

      - name: Upload artifacts
        if: ${{ inputs.snapshot || inputs.skip-publish }}
        uses: actions/upload-artifact@v4
        with:
          name: goreleaser-dist
          path: ${{ inputs.working-directory }}/dist/
          retention-days: 7
          if-no-files-found: warn

      - name: Generate build summary
        if: always()
        run: |
          echo "## GoReleaser Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Config**: \`${{ inputs.goreleaser-config }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Snapshot**: ${{ inputs.snapshot }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Go Version**: ${{ inputs.go-version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **GoReleaser Version**: ${{ inputs.goreleaser-version }}" >> $GITHUB_STEP_SUMMARY
          
          if [[ -d dist ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Artifacts Generated" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            find dist -type f | head -20 >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi

---
#################################################################################################
# DEMO PIPELINE                                                                                 #
#                                                                                               #
# Call from another pipeline with:                                                              #
#                                                                                               #
# jobs:                                                                                         #
#   call-template:                                                                              #
#     ## Replace vx.x.x with a version in redjax/PipelineTemplates/manifests/versions.yml       #
#     uses: redjax/PipelineTemplates/.github/workflows/demo-hello.yml@github/demo-hello/vx.x.x  #
#     with:                                                                                     #
#       message: Hello from <repository-name>                                                   #
#################################################################################################

name: Hello Template

on:
  workflow_call:
    inputs:
      message:
        description: Message to print
        required: false
        type: string
        default: hello from pipeline templates

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - name: Print message
        run: echo "${{ inputs.message }}"

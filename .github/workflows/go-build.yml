---
#######################################
# Pipeline to build a Go application. #
#######################################

name: Go Build

on:
  workflow_call:
    inputs:
      module-dir:
        description: "(default: .) Path to directory containing main.go entrypoint"
        required: false
        type: string
        default: .
      build-package:
        description: "Go package path to build, for example . or ./cmd/example."
        required: true
        type: string

      binary-name:
        description: "Name for binary file."
        required: true
        type: string
      platforms:
        description: "Comma-separated list of GOOS/GOARCH targets, such as linux/amd64,linux/arm64."
        required: false
        type: string
        default: linux/amd64
      build-tags:
        description: "Optional Go build tags."
        required: false
        type: string
        default: ""
      ldflags:
        description: "Optional ldflags passed to go build."
        required: false
        type: string
        default: ""
      output-dir:
        description: "Directory to write build artifacts to."
        required: false
        type: string
        default: dist
      go-version:
        description: "Go toolchain version to install."
        required: false
        type: string
        default: "1.25.6"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4

      ## This pipeline needs to clone the whole PipelineTemplates repo in order to access
      #  the shared go-build.sh script. We need to parse the incoming workflow reference
      #  to determine which revision to checkout based on the tag given in the calling workflow.
      #
      # This step extracts the repository and ref from the github.workflow_ref variable, which has the format:
      # "owner/repo/.github/workflows/workflow.yml@refs/heads/branch"
      - name: Parse workflow reference
        id: workflow-ref
        run: |
          # github.workflow_ref format: "owner/repo/.github/workflows/workflow.yml@refs/heads/branch"
          # Extract repository (everything before /.github/) and ref (everything after @)
          echo "=== Debugging workflow reference ==="
          echo "github.workflow_ref: ${{ github.workflow_ref }}"
          echo "github.repository: ${{ github.repository }}"
          echo "github.ref: ${{ github.ref }}"
          echo "===================================="
          
          WORKFLOW_REF="${{ github.workflow_ref }}"
          REPO="${WORKFLOW_REF%%/.github/*}"
          REF="${WORKFLOW_REF##*@}"
          echo "repository=$REPO" >> $GITHUB_OUTPUT
          echo "ref=$REF" >> $GITHUB_OUTPUT
          echo "Parsed values: repo=$REPO, ref=$REF"

      ## Checkout the PipelineTemplates repo at the same ref as the calling workflow,
      #  so that we can access the shared go-build.sh script.
      - name: Checkout PipelineTemplates repo
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.workflow-ref.outputs.repository }}
          ref: ${{ steps.workflow-ref.outputs.ref }}
          path: pipelinetemplates

      - name: Debug - Verify checkout
        run: |
          echo "=== Verifying PipelineTemplates checkout ==="
          ls -la pipelinetemplates/ 2>&1 || echo "ERROR: pipelinetemplates/ directory not found!"
          echo ""
          echo "Looking for bash script:"
          if [[ -f "pipelinetemplates/shared/scripts/bash/go/go-build.sh" ]]; then
            echo "✓ Script found at: pipelinetemplates/shared/scripts/bash/go/go-build.sh"
            ls -lh pipelinetemplates/shared/scripts/bash/go/go-build.sh
          else
            echo "✗ Script NOT found!"
            echo "Contents of pipelinetemplates:"
            find pipelinetemplates -type f 2>/dev/null | head -20 || echo "find command failed"
          fi
          echo "============================================"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Build
        env:
          MODULE_DIR: ${{ inputs.module-dir }}
          BUILD_PACKAGE: ${{ inputs.build-package }}
          BINARY_NAME: ${{ inputs.binary-name }}
          PLATFORMS: ${{ inputs.platforms }}
          BUILD_TAGS: ${{ inputs.build-tags }}
          LDFLAGS: ${{ inputs.ldflags }}
          OUTPUT_DIR: ${{ inputs.output-dir }}
        run: bash pipelinetemplates/shared/scripts/bash/go/go-build.sh

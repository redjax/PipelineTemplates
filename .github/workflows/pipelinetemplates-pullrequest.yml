---
############################################################
# Pull request pipeline versioning workflow                #
#                                                          #
# Runs on PRs opened against main and on PR updates.       #
# Detects changed tracked pipeline templates, bumps        #
# manifests/versions.yml if needed, and commits that       #
# manifest change back to the PR branch.                   #
#                                                          #
# This workflow does not create tags. Tagging happens only #
# after the PR is merged, in the merge-and-tag workflow.   #
############################################################

name: Pull Request Jobs

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - closed

permissions:
  contents: write

jobs:
  update-manifest:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch base branch
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}

      - name: Compute merge base
        run: |
          echo "BASE_REF=$(git merge-base origin/${{ github.event.pull_request.base.ref }} HEAD)" >> "$GITHUB_ENV"
          echo "HEAD_REF=HEAD" >> "$GITHUB_ENV"

      - name: Update manifest
        run: |
          chmod +x ./.scripts/release.sh
          ./.scripts/release.sh

      - name: Commit and push changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git add manifests/versions.yml
            git commit -m "chore: bump pipeline template versions"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
